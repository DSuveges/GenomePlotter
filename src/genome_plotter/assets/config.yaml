plot_parameters:
  width: 200                  # number of genomic chunks per row
  pixel_size: 18              # size of each chunk in pixels
  dark_start: 0.75            # fraction of row width where darkening begins
  dark_max: 0.4               # maximum darkness at right edge (0.0=black, 1.0=unchanged)
  custom_gene_window: 10000   # flanking window in bp for custom gene arrow plots

basic_parameters:
  chunk_size: 450             # genomic window size in base pairs
  missing_tolerance: null     # set at runtime: max fraction of Ns allowed per chunk (0.0–1.0)
  data_folder: null           # set at runtime via --dataDir
  plot_folder: null           # set at runtime via --folder
  row_length: null            # derived: total number of chunks per chromosome row

color_schema:
  chromosome_colors:
    centromere: "#9393FF"
    heterochromatin: "#F9D2C2"
    intergenic: "#A3E0D1"
    exon: "#FFD326"
    gene: "#6CB8CC"
    dummy: "#B3F29D"
  gwas_point: "#000000"
  arrow_colors:
    line_color: "#6495ED"
    utr_color: "#CE93D8"
    cds_color: "#F4A460"
  cytoband_colors:
    gneg: "#FFFFFF"
    gpos25: "#E5E5E5"
    gpos50: "#CCCCCC"
    gpos75: "#B3B3B3"
    gpos100: "#999999"
    acen: "#CCCCCC"
    gvar: "#999999"
    stalk: "#E5E5E5"
    border: "#000000"

source_data:
  cytoband_data:
    url: "https://rest.ensembl.org/info/assembly/homo_sapiens?content-type=application/json&bands=1"
    processed_file: processed_cytoBand.bed.gz
    genome_build: null        # populated after fetch (e.g. GRCh38)

  ensembl_data:
    host: ftp.ensembl.org
    path: /pub/release-{}/fasta/homo_sapiens/dna
    source_file: Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz
    version_url: "https://rest.ensembl.org/info/data/?content-type=application/json"
    release: null             # populated after fetch
    processed_file: "processed_chr{}.bed.gz"

  gencode_data:
    host: ftp.ebi.ac.uk
    path: /pub/databases/gencode/Gencode_human
    source_file: "gencode.v{}.annotation.gtf.gz"
    processed_file: processed_gencode.bed.gz
    arrow_file: processed_gencode_arrow.bed.gz
    version: null             # populated after fetch
    release_date: null        # populated after fetch

  gwas_data:
    host: ftp.ebi.ac.uk
    path: /pub/databases/gwas/releases/latest
    source_file: gwas-catalog-associations_ontology-annotated-full.zip
    processed_file: processed_GWAS.bed.gz
    release_date: null        # populated after fetch
